name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: production
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ── Build Docker images ───────────────────────────────────────────────────────
  docker:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [api, web, admin, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Run Prisma migrations ─────────────────────────────────────────────────────
  migrate:
    name: Database migrations
    needs: docker
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm --filter @claw/db exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Deploy to Kubernetes ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    needs: [docker, migrate]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config

      - name: Update image tags
        run: |
          SHA=sha-${{ github.sha }}
          kubectl set image deployment/claw-api api=${{ env.IMAGE_PREFIX }}/api:$SHA -n claw-platform
          kubectl set image deployment/claw-web web=${{ env.IMAGE_PREFIX }}/web:$SHA -n claw-platform
          kubectl set image deployment/claw-admin admin=${{ env.IMAGE_PREFIX }}/admin:$SHA -n claw-platform
          kubectl set image deployment/claw-worker worker=${{ env.IMAGE_PREFIX }}/worker:$SHA -n claw-platform

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/claw-api -n claw-platform --timeout=120s
          kubectl rollout status deployment/claw-web -n claw-platform --timeout=120s
          kubectl rollout status deployment/claw-admin -n claw-platform --timeout=120s
          kubectl rollout status deployment/claw-worker -n claw-platform --timeout=120s

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back"
          kubectl rollout undo deployment/claw-api -n claw-platform
          kubectl rollout undo deployment/claw-web -n claw-platform
          kubectl rollout undo deployment/claw-worker -n claw-platform

